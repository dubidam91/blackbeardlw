<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Update Progress Equipment Lineage W</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f8f8f8;
        margin: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    .header-section {
        text-align: center;
        margin-bottom: 30px;
    }
    #characterForm {
        margin-bottom: 20px;
    }
    #characterForm input[type="text"] {
        padding: 8px;
        font-size: 16px;
        width: 250px;
        margin-right: 10px;
    }
    #characterForm button {
        padding: 8px 12px;
        font-size: 16px;
        cursor: pointer;
    }
    .character-container {
        margin-bottom: 40px;
        border: 2px solid #ccc;
        border-radius: 10px;
        padding: 15px;
        background-color: #fff;
    }
    .character-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    .character-name {
        font-size: 20px;
        font-weight: bold;
    }
    .remove-btn {
        background-color: #e74c3c;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }
    th {
        background-color: #efefef;
    }
    .level {
        padding: 3px 8px;
        border-radius: 5px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        border: 1px solid #999;
    }
    /* Warna untuk level */
    .common {
        background-color: #fff;
        color: #555;
        border: 1px solid #ccc;
    }
    .magic {
        background-color: green;
    }
    .rare {
        background-color: blue;
    }
    #saveButton {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #3498db;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    #saveButton:hover {
        background-color: #2980b9;
    }
</style>
</head>
<body>
<div class="header-section">
    <h1>Update Progress Equipment - Lineage W</h1>
    <p>Armor Equipment Progress - Common (Putih), Magic (Hijau), Rare (Biru)</p>
    <form id="characterForm">
        <input type="text" id="characterNameInput" placeholder="Masukkan nama karakter" required />
        <button type="submit">Tambah Karakter</button>
    </form>
</div>

<div id="charactersContainer"></div>
<button id="saveButton">Simpan</button>

<script>
const parts = ['Head', 'Body', 'Hand', 'Legs', 'Foot', 'Shirt', 'Shoulder', 'Weapon', 'Secondary Weapon', 'Mantle'];
const equipmentLevels = [
    { level: 'Common', colorClass: 'common' },
    { level: 'Magic', colorClass: 'magic' },
    { level: 'Rare', colorClass: 'rare' }
];

const charactersContainer = document.getElementById('charactersContainer');
const characterForm = document.getElementById('characterForm');
const characterNameInput = document.getElementById('characterNameInput');
const saveButton = document.getElementById('saveButton');

let characters = JSON.parse(localStorage.getItem('characters')) || [];

function saveData() {
    localStorage.setItem('characters', JSON.stringify(characters));
}

// Render semua data karakter
function renderCharacters() {
    charactersContainer.innerHTML = '';
    characters.forEach((character, index) => {
        const characterDiv = document.createElement('div');
        characterDiv.className = 'character-container';

        // Header nama dan hapus
        const headerDiv = document.createElement('div');
        headerDiv.className = 'character-header';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'character-name';
        nameDiv.innerText = character.name;

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerText = 'Hapus';
        removeBtn.onclick = () => {
            characters.splice(index, 1);
            saveData();
            renderCharacters();
        };

        headerDiv.appendChild(nameDiv);
        headerDiv.appendChild(removeBtn);
        characterDiv.appendChild(headerDiv);

        // Tampilkan data equipment dalam tabel
        if (character.equipment && character.equipment.parts && character.equipment.levels) {
            const table = document.createElement('table');

            // Header tabel
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            ['Bagian', 'Level'].forEach(text => {
                const th = document.createElement('th');
                th.innerText = text;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Isi tabel
            const tbody = document.createElement('tbody');
            character.equipment.parts.forEach(part => {
                const row = document.createElement('tr');

                const partTd = document.createElement('td');
                partTd.innerText = part;

                const levelTd = document.createElement('td');
                const levelSpan = document.createElement('span');
                levelSpan.innerText = character.equipment.levels[part] || 'Belum Dipilih';
                levelSpan.className = 'level ' + (function() {
                    const lvl = character.equipment.levels[part];
                    if (lvl === 'Common') return 'common';
                    if (lvl === 'Magic') return 'magic';
                    if (lvl === 'Rare') return 'rare';
                    return '';
                })();
                levelSpan.onclick = () => {
                    // Ganti level
                    const currentLevel = character.equipment.levels[part];
                    let nextLevelIndex = 0;
                    if (currentLevel === 'Common') nextLevelIndex = 1;
                    else if (currentLevel === 'Magic') nextLevelIndex = 2;
                    else if (currentLevel === 'Rare') nextLevelIndex = 0;
                    else nextLevelIndex = 0;

                    character.equipment.levels[part] = equipmentLevels[nextLevelIndex].level;
                    saveData();
                    renderCharacters();
                };
                levelTd.appendChild(levelSpan);
                row.appendChild(partTd);
                row.appendChild(levelTd);
                tbody.appendChild(row);
            });
            table.appendChild(tbody);
            characterDiv.appendChild(table);
        } else {
            // Jika belum ada data, tampilkan pesan
            const p = document.createElement('p');
            p.innerText = 'Data equipment belum disimpan.';
            characterDiv.appendChild(p);
        }

        charactersContainer.appendChild(characterDiv);
    });
}

// Tambah karakter baru
characterForm.onsubmit = (e) => {
    e.preventDefault();
    const name = characterNameInput.value.trim();
    if (name === '') return;
    const newChar = {
        name: name,
        equipment: {
            name: 'Equipment',
            parts: [...parts],
            levels: {} // level per bagian
        }
    };
    characters.push(newChar);
    saveData();
    renderCharacters();
    characterNameInput.value = '';
};

// Tombol Simpan
saveButton.onclick = () => {
    saveData();
    alert('Data berhasil disimpan!');
};

renderCharacters();
</script>
</body>
</html>
