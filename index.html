<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Update Progress Equipment Lineage W</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f8f8f8;
        margin: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    .header-section {
        text-align: center;
        margin-bottom: 30px;
    }
    #characterForm {
        margin-bottom: 20px;
    }
    #characterForm input[type="text"] {
        padding: 8px;
        font-size: 16px;
        width: 250px;
        margin-right: 10px;
    }
    #characterForm button {
        padding: 8px 12px;
        font-size: 16px;
        cursor: pointer;
    }
    .character-container {
        margin-bottom: 40px;
        border: 2px solid #ccc;
        border-radius: 10px;
        padding: 15px;
        background-color: #fff;
        position: relative;
    }
    .character-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }
    .character-name {
        font-size: 20px;
        font-weight: bold;
    }
    .buttons-group {
        display: flex;
        gap: 10px;
    }
    .action-btn {
        background-color: #3498db;
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }
    .action-btn:hover {
        background-color: #2980b9;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }
    th {
        background-color: #efefef;
    }
    /* Warna untuk level */
    .common { background-color: #cccccc; color: #000; border: 1px solid #999; }
    .magic { background-color: #00aa00; color: #fff; }
    .rare { background-color: #0000ff; color: #fff; }
    /* Style dropdown select agar sesuai warna level */
    select {
        padding: 4px;
        font-size: 14px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }
    /* Custom warna dropdown options (tidak langsung bisa di CSS, tapi kita bisa style selected option) */
    /* Tapi agar konsisten, kita atur warna item di dropdown secara inline saat dibuat */
    #saveButton {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        font-size: 16px;
        background-color: #3498db;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    #saveButton:hover {
        background-color: #2980b9;
    }
</style>
</head>
<body>
<div class="header-section">
    <h1>Update Progress Equipment - Lineage W</h1>
    <p>Armor Equipment Progress - Common (Abu-abu), Magic (Hijau), Rare (Biru)</p>
    <form id="characterForm">
        <input type="text" id="characterNameInput" placeholder="Masukkan nama karakter" required />
        <button type="submit">Tambah Karakter</button>
    </form>
</div>

<div id="charactersContainer"></div>
<button id="saveButton">Simpan</button>

<script>
const parts = ['Head', 'Body', 'Hand', 'Legs', 'Foot', 'Shirt', 'Shoulder', 'Weapon', 'Secondary Weapon', 'Mantle'];
const equipmentLevels = [
    { level: 'Common', colorClass: 'common' },
    { level: 'Magic', colorClass: 'magic' },
    { level: 'Rare', colorClass: 'rare' }
];

const charactersContainer = document.getElementById('charactersContainer');
const characterForm = document.getElementById('characterForm');
const characterNameInput = document.getElementById('characterNameInput');
const saveButton = document.getElementById('saveButton');

let characters = JSON.parse(localStorage.getItem('characters')) || [];

function saveData() {
    localStorage.setItem('characters', JSON.stringify(characters));
}

// Fungsi cetak data karakter (dengan tabel horizontal)
function printCharacter(character) {
    const printWindow = window.open('', '', 'width=1000,height=600');
    printWindow.document.write('<html><head><title>Data Karakter</title>');
    printWindow.document.write('<style>');
    printWindow.document.write(`
        body { font-family: Arial, sans-serif; margin: 20px; }
        h2 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #efefef; }
        .level { padding: 3px 8px; border-radius: 5px; font-weight: bold; color: #fff; }
        .common { background-color: #cccccc; color: #000; border: 1px solid #999; }
        .magic { background-color: #00aa00; color: #fff; }
        .rare { background-color: #0000ff; color: #fff; }
    `);
    printWindow.document.write('</style></head><body>');
    printWindow.document.write('<h2>Data Karakter: ' + character.name + '</h2>');
    if (character.equipment && character.equipment.parts && character.equipment.levels) {
        printWindow.document.write('<table>');
        // Header kolom bagian
        printWindow.document.write('<thead><tr><th>Bagian</th>');
        // Tambahkan header level dari semua bagian
        character.equipment.parts.forEach(part => {
            printWindow.document.write('<th>' + part + '</th>');
        });
        printWindow.document.write('</tr></thead>');
        // Baris level dari semua bagian
        printWindow.document.write('<tbody><tr><td>Level</td>');
        character.equipment.parts.forEach(part => {
            const level = character.equipment.levels[part] || 'Belum Dipilih';
            const levelClass = (() => {
                if (level === 'Common') return 'common';
                if (level === 'Magic') return 'magic';
                if (level === 'Rare') return 'rare';
                return '';
            })();
            printWindow.document.write(
                `<td><span class="level ${levelClass}">${level}</span></td>`
            );
        });
        printWindow.document.write('</tr></tbody>');
        printWindow.document.write('</table>');
    } else {
        printWindow.document.write('<p>Data equipment belum disimpan.</p>');
    }
    printWindow.document.write('</body></html>');
    printWindow.document.close();
    printWindow.focus();
    printWindow.print();
}

// Render semua data karakter
function renderCharacters() {
    charactersContainer.innerHTML = '';
    characters.forEach((character, index) => {
        const characterDiv = document.createElement('div');
        characterDiv.className = 'character-container';

        // Header nama dan tombol
        const headerDiv = document.createElement('div');
        headerDiv.className = 'character-header';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'character-name';
        nameDiv.innerText = character.name;

        const buttonsDiv = document.createElement('div');
        buttonsDiv.className = 'buttons-group';

        const printBtn = document.createElement('button');
        printBtn.className = 'action-btn';
        printBtn.innerText = 'Cetak';
        printBtn.onclick = () => printCharacter(character);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'action-btn';
        removeBtn.innerText = 'Hapus';
        removeBtn.onclick = () => {
            characters.splice(index, 1);
            saveData();
            renderCharacters();
        };

        buttonsDiv.appendChild(printBtn);
        buttonsDiv.appendChild(removeBtn);

        headerDiv.appendChild(nameDiv);
        headerDiv.appendChild(buttonsDiv);
        characterDiv.appendChild(headerDiv);

        // Tampilkan data equipment dalam tabel (horizontal) dengan dropdown pilihan
        if (character.equipment && character.equipment.parts && character.equipment.levels) {
            const table = document.createElement('table');

            // Header kolom bagian
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headerRow.appendChild(document.createElement('th')).innerText = 'Bagian';
            character.equipment.parts.forEach(part => {
                const th = document.createElement('th');
                th.innerText = part;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Baris level dari semua bagian dengan dropdown
            const tbody = document.createElement('tbody');
            const levelRow = document.createElement('tr');
            levelRow.appendChild(document.createElement('td')).innerText = 'Level';

            character.equipment.parts.forEach(part => {
                const td = document.createElement('td');
                const select = document.createElement('select');

                equipmentLevels.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.level;
                    opt.innerText = option.level;
                    // Set selected jika cocok
                    if (character.equipment.levels[part] === option.level) {
                        opt.selected = true;
                    }
                // Style warna options sesuai level
                if (option.level === 'Common') {
                    opt.style.backgroundColor = '#cccccc'; // abu-abu
                    opt.style.color = '#000';
                } else if (option.level === 'Magic') {
                    opt.style.backgroundColor = '#00aa00'; // hijau
                    opt.style.color = '#fff';
                } else if (option.level === 'Rare') {
                    opt.style.backgroundColor = '#0000ff'; // biru
                    opt.style.color = '#fff';
                }

                    select.appendChild(opt);
                });

                // Saat dropdown diubah, update data level
                select.onchange = () => {
                    const selectedOption = select.options[select.selectedIndex].value;
                    character.equipment.levels[part] = selectedOption;
                };

                td.appendChild(select);
                levelRow.appendChild(td);
            });
            tbody.appendChild(levelRow);
            table.appendChild(tbody);
            characterDiv.appendChild(table);
        } else {
            const p = document.createElement('p');
            p.innerText = 'Data equipment belum disimpan.';
            characterDiv.appendChild(p);
        }

        charactersContainer.appendChild(characterDiv);
    });
}

// Tambah karakter baru
characterForm.onsubmit = (e) => {
    e.preventDefault();
    const name = characterNameInput.value.trim();
    if (name === '') return;
    const newChar = {
        name: name,
        equipment: {
            name: 'Equipment',
            parts: [...parts],
            levels: {}
        }
    };
    characters.push(newChar);
    saveData();
    renderCharacters();
    characterNameInput.value = '';
};

// Tombol Simpan
saveButton.onclick = () => {
    saveData();
    alert('Data berhasil disimpan!');
};

renderCharacters();
</script>
</body>
</html>
